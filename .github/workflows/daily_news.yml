name: Daily News Digest

on:
  schedule:
    # JST 6:00 = UTC 21:00, JST 12:00 = UTC 3:00, JST 17:00 = UTC 8:00
    - cron: "0 21,3,8 * * *"
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write  # GitHub Pagesへのpushに必要

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: ニュースを生成
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_news.py

      - name: GitHub Pages へコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "chore: update news digest $(date +'%Y-%m-%d %H:%M JST' -d '+9 hours')"
          git push
